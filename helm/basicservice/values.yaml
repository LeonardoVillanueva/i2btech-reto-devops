# values.yaml -- Valores por defecto para basicservice Helm Chart

# Imagen Docker de la aplicacion
image:
  repository: basicservice
  tag: "latest"
  pullPolicy: IfNotPresent

# Numero de replicas del Deployment
replicaCount: 1

# Configuracion del Service (ClusterIP)
service:
  port: 3000

# Configuracion del Ingress
ingress:
  enabled: true
  className: nginx
  host: basicservice.local
  tls:
    enabled: true
    secretName: basicservice-tls

# Configuracion de autenticacion HTTP Basic para /private
auth:
  secretName: basicservice-htpasswd
  realm: "Restricted"
  # htpasswdContent se pasa via --set en tiempo de despliegue
  htpasswdContent: ""

# Configuracion de persistencia de logs (hostPath)
persistence:
  hostPath: /mnt/logs/basicservice
  storageSize: 1Gi

# SecurityContext del contenedor (principio de minimo privilegio)
securityContext:
  runAsUser: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
