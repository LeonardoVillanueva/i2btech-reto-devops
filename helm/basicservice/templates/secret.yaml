apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.secretName }}
  labels:
    app: basicservice
    release: {{ .Release.Name }}
type: Opaque
data:
  # Contenido del archivo .htpasswd codificado en base64
  # Se pasa via: --set auth.htpasswdContent="usuario:hash_password"
  # Ejemplo de generación: htpasswd -nb admin password
  auth: {{ .Values.auth.htpasswdContent | b64enc | quote }}
