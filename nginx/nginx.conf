# nginx.conf — Reverse proxy HTTPS para basicservice
# Redirige HTTP → HTTPS y protege /private con auth_basic

# Bloque server: HTTP en puerto 80 — solo redirige a HTTPS
server {
    listen 80;
    server_name _;

    # Redirección permanente a HTTPS para cualquier ruta
    return 301 https://$host$request_uri;
}

# Bloque server: HTTPS en puerto 443 — proxy hacia la app
server {
    listen 443 ssl;
    server_name _;

    # Certificados TLS montados como bind mount desde secrets/
    ssl_certificate     /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;

    # Protocolos y cifrados seguros
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Cabeceras de seguridad en todas las respuestas HTTPS
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Ruta raíz — acceso público sin autenticación
    location / {
        proxy_pass         http://app:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Ruta pública — acceso sin autenticación
    location /public {
        proxy_pass         http://app:3000/public;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check — acceso sin autenticación (usado por probes)
    location /health_check {
        proxy_pass         http://app:3000/health_check;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Ruta privada — requiere autenticación HTTP Basic
    location /private {
        # Autenticación HTTP Basic con archivo htpasswd montado externamente
        auth_basic           "Restricted";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        proxy_pass         http://app:3000/private;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
