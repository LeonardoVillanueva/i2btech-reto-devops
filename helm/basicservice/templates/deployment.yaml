apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-basicservice
  labels:
    app: basicservice
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: basicservice
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: basicservice
        release: {{ .Release.Name }}
    spec:
      # SecurityContext a nivel de pod
      securityContext:
        fsGroup: 1000

      # initContainer para crear el directorio de logs con permisos correctos
      initContainers:
        - name: fix-logs-permissions
          image: busybox
          command: ["sh", "-c", "mkdir -p /app/src/logs && chown -R 1000:1000 /app/src/logs && chmod 775 /app/src/logs"]
          volumeMounts:
            - name: app-logs
              mountPath: /app/src/logs
          securityContext:
            runAsUser: 0
            runAsNonRoot: false

      containers:
        - name: basicservice
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}

          # SecurityContext a nivel de contenedor
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}

          # Probe de liveness — reinicia el pod si la app no responde
          livenessProbe:
            httpGet:
              path: /health_check
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          # Probe de readiness — controla cuándo el pod recibe tráfico
          readinessProbe:
            httpGet:
              path: /health_check
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          # Montar el volumen de logs en el directorio de la app
          volumeMounts:
            - name: app-logs
              mountPath: /app/src/logs

      volumes:
        - name: app-logs
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-logs-pvc
